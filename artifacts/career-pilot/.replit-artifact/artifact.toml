kind = "web"
previewPath = "/"
title = "CareerPilot AI"
version = "1.0.0"
id = "artifacts/career-pilot"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26034

[services.development]
run = "pnpm --filter @workspace/career-pilot run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/career-pilot", "run", "build" ]
publicDir = "artifacts/career-pilot/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26034"
BASE_PATH = "/"
